<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Meu E-commerce</title>
    <link rel="stylesheet" href="./EsqueceuSenha01.css">

</head>

<body>
    <div id="img-banner">
        <div class="login-container">
            <div class="login-header">
                <h2>Recuperar senha</h2>
                <p>Insira o e-mail cadastrado para receber as instruções de redefinição.</p>
            </div>

            <form action="#" class="login-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu-email@exemplo.com" required>
                </div>

                <button type="submit" class="btn-login" onclick="alert('Senha enviada com Sucesso')">Enviar link de
                    recuperação</button>
            </form>

            <div class="login-footer">
                <p>Lembrou a senha? <a href="../login01/login01.html">Voltar para o login</a></p>
            </div>
        </div>
    </div>
</body>

</html>
