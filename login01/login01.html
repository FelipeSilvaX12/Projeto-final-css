<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meu E-commerce</title>
    <link rel="stylesheet" href="./login01.css">
    <link rel="stylesheet" href="../global.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div id="img-banner">
        <div class="login-container">

            <header>
                <h1>GamerShop</h1>
            </header>

            <div class="login-header">

                <h2>Bem-vindo(a) de volta!</h2>
                <p>Faça login para continuar suas compras</p>
            </div>

            <form action="#" class="login-form" onsubmit="fazerLogin(event)">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email1" placeholder="seu-email@exemplo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password1" placeholder="Digite sua senha" required>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> Lembrar de mim
                    </label>
                    <a href="../EsqueceuSenha01/EsqueceuSenha01.html" class="forgot-password">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>

            <div class="login-footer">
                <p>Ainda não tem uma conta? <a href="../cadastro01/cadastro01.html">Cadastre-se</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>]

    <script src="./login.js"></script>
</body>

</html>
