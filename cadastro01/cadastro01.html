<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./cadastro01.css">
    <link rel="stylesheet" href="../global.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>





<body>


    <div class="img-banner">

        <div class="container">

            <header>
                <h1>
                    Gamer Shop
                </h1>
            </header>
            <form class="form-cadastro" action="#" method="get" onsubmit="realizarCadastro(event)">




                <h2>Criar Conta</h2>

                <!-- Dados Pessoais -->
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <div class=" input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome1" name="nome" placeholder="Digite seu nome completo" required>
                    </div>

                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="email1" name="email" placeholder="exemplo@email.com" required>
                    </div>

                    <div class="input-group">
                        <label>Data de Nascimento</label>
                        <input type="date" id="nascimento1" name="nascimento" required>
                    </div>
                </fieldset>

                <!-- Dados de Acesso -->
                <fieldset>
                    <legend>Dados de Acesso</legend>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="senha1" name="senha" placeholder="Mínimo 6 caracteres" required>
                    </div>

                    <div class="input-group">
                        <label for="confirmar-senha">Confirmar Senha</label>
                        <input type="password" id="confirmar-senha1" name="confirmar-senha"
                            placeholder="Repita sua senha" required>
                    </div>
                </fieldset>

                <!-- Endereço -->
                <fieldset>
                    <legend>Endereço</legend>
                    <div class="input-group">
                        <label>CEP</label>
                        <input type="text" id="cep1" name="cep" placeholder="00000-000" required>
                    </div>

                    <div class="input-group">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco1" name="endereco" placeholder="Rua, Av, Travessa" required>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Número</label>
                            <input type="text" id="numero1" name="numero" placeholder="Ex: 123" required>
                        </div>
                        <div class="input-group">
                            <label for="bairro">Bairro</label>
                            <input type="text" id="bairro1" name="bairro" placeholder="Seu bairro" required>
                        </div>
                    </div>
                </fieldset>

                <!-- Termos e Botão -->
                <div class="termos">
                    <input type="checkbox" id="termos1" name="termos" required>
                    <label>Eu li e concordo com os <a href="#" target="_blank">Termos de Uso e Política
                            de
                            Privacidade</a>.</label>
                </div>

                <button type="submit" class="btn btn-primary"> Cadastrar</button>

                <p class="login-link">Já tem uma conta? <a href="../login01/login01.html">Faça login aqui</a>.</p>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="./cadastro.js"></script>

</body>

</html>
