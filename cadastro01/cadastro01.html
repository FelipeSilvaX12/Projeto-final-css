<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./cadastro01.css">
    <link rel="stylesheet" href="../global.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>



    <body>

        <div class="img-banner">

            <div class="container">

                <header>
                        <h1>
                            Gamer Shop
                        </h1>
                    </header>
                <form class="form-cadastro" action="#" method="get">

                    


                    <h2>Criar Conta</h2>

                    <!-- Dados Pessoais -->
                    <fieldset>
                        <legend>Dados Pessoais</legend>
                        <div class="input-group">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                        </div>

                        <div class="input-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
                        </div>

                        <div class="input-group">
                            <label for="nascimento">Data de Nascimento</label>
                            <input type="date" id="nascimento" name="nascimento" required>
                        </div>
                    </fieldset>

                    <!-- Dados de Acesso -->
                    <fieldset>
                        <legend>Dados de Acesso</legend>
                        <div class="input-group">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required>
                        </div>

                        <div class="input-group">
                            <label for="confirmar-senha">Confirmar Senha</label>
                            <input type="password" id="confirmar-senha" name="confirmar-senha"
                                placeholder="Repita sua senha" required>
                        </div>
                    </fieldset>

                    <!-- Endereço -->
                    <fieldset>
                        <legend>Endereço</legend>
                        <div class="input-group">
                            <label for="cep">CEP</label>
                            <input type="text" id="cep" name="cep" placeholder="00000-000" required>
                        </div>

                        <div class="input-group">
                            <label for="endereco">Endereço</label>
                            <input type="text" id="endereco" name="endereco" placeholder="Rua, Av, Travessa" required>
                        </div>

                        <div class="input-row">
                            <div class="input-group">
                                <label for="numero">Número</label>
                                <input type="text" id="numero" name="numero" placeholder="Ex: 123" required>
                            </div>
                            <div class="input-group">
                                <label for="bairro">Bairro</label>
                                <input type="text" id="bairro" name="bairro" placeholder="Seu bairro" required>
                            </div>
                        </div>
                    </fieldset>

                    <!-- Termos e Botão -->
                    <div class="termos">
                        <input type="checkbox" id="termos" name="termos" required>
                        <label for="termos">Eu li e concordo com os <a href="#" target="_blank">Termos de Uso e Política
                                de
                                Privacidade</a>.</label>
                    </div>

                    <a href="../index.html" class="btn-cadastrar"
                        style="text-align: center; display: block; text-decoration: none;">Cadastrar</a>

                    <p class="login-link">Já tem uma conta? <a href="../login01/login01.html">Faça login aqui</a>.</p>
                </form>
            </div>
        </div>
    </body>



</body>
